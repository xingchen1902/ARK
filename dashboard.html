<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK 链上数据看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
.header { text-align: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 24px 32px; }
.header h1 { font-size: 24px; margin-bottom: 4px; }
.header p { font-size: 14px; opacity: 0.8; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* Summary Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
.card .value { font-size: 22px; font-weight: 700; }
.card .value.positive { color: #22c55e; }
.card .value.negative { color: #ef4444; }
.card .sub { font-size: 12px; color: #999; margin-top: 4px; }

.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-box { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.chart-box h3 { font-size: 15px; margin-bottom: 16px; color: #555; }

.table-wrap { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
.table-wrap h3 { font-size: 15px; margin-bottom: 16px; color: #555; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #f8f9fa; padding: 10px 12px; text-align: right; font-weight: 600; color: #555; border-bottom: 2px solid #e9ecef; }
th:first-child { text-align: left; }
td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #f0f0f0; }
td:first-child { text-align: left; font-weight: 600; }
tr:hover td { background: #f8f9ff; }

@media (max-width: 900px) {
  .charts { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 ARK 链上数据看板</h1>
  <p id="updateTime">BSC 链 · 数据来源于飞书多维表格</p>
</div>

<div class="container">
  <div class="cards" id="summaryCards"></div>

  <div class="charts">
    <div class="chart-box"><h3>📈 奖金池 · 涡轮 · 质押趋势</h3><canvas id="mainChart"></canvas></div>
    <div class="chart-box"><h3>🥧 净质押 & gARK销毁</h3><canvas id="netChart"></canvas></div>
  </div>

  <div class="table-wrap">
    <h3>📋 每日明细</h3>
    <table id="dataTable"><thead><tr>
      <th>日期</th><th>奖金池余额</th><th>奖金池提取</th><th>动静态涡轮</th><th>静态涡轮</th>
      <th>动态涡轮</th><th>质押池余额</th><th>新增质押</th><th>赎回</th><th>净质押量</th>
    </tr></thead><tbody></tbody></table>
  </div>
</div>
<script>
// ========== 从 data.json 加载数据（飞书实时同步）==========
// 如果 data.json 不存在或加载失败，使用内嵌的静态数据
let chartData = null;

function fmtNum(n) {
  return Math.round(n).toLocaleString();
}

async function loadData() {
  // 优先从 Vercel API 获取
  // 优先从 VPS SQLite API 读取，Vercel API 作为备选
  const isFileProtocol = window.location.protocol === 'file:';
  const vpsApi = 'http://35.212.161.87:8080/api/data';
  const apiUrl = isFileProtocol ? vpsApi : '/api/proxy';

  try {
    const resp = await fetch(apiUrl);
    const json = await resp.json();
    if (json && json.data && json.data.length > 0) {
      // 按日期去重，每个日期只保留最新一条
      const seen = {};
      json.data.forEach(item => { seen[item.date] = item; });
      chartData = Object.values(seen).sort((a, b) => a.date.localeCompare(b.date));
      document.getElementById('updateTime').textContent = 'BSC 链 · 飞书数据实时同步 · 更新于 ' + (json.last_update || '');
      render();
      return;
    }
  } catch(e) {
    console.log('API 加载失败，使用内嵌数据', e);
  }
  // 降级到内嵌数据
  chartData = [{"date": "2026-06-12", "bonus_balance": 8983347.17, "bonus_withdraw": 162498.03, "dynamic": 190537.31, "static": 114163.61, "dynamic_turbo": 76373.7, "stake_balance": 24334080.6, "stake_in": 128240.01, "stake_out": 70148.95, "net_stake": 58091.06}, {"date": "2026-06-13", "bonus_balance": 8820849.14, "bonus_withdraw": 199718.26, "dynamic": 249413.4, "static": 125006.99, "dynamic_turbo": 124406.41, "stake_balance": 24392171.66, "stake_in": 138066.99, "stake_out": 55740.78, "net_stake": 82326.21}, {"date": "2026-06-14", "bonus_balance": 8621130.88, "bonus_withdraw": 212095.38, "dynamic": 307274.99, "static": 200159.2, "dynamic_turbo": 107115.79, "stake_balance": 24474497.87, "stake_in": 178024.07, "stake_out": 61803.22, "net_stake": 116220.85}, {"date": "2026-06-15", "bonus_balance": 8409035.5, "bonus_withdraw": 278527.54, "dynamic": 258786.36, "static": 155104.36, "dynamic_turbo": 103682.0, "stake_balance": 24590718.72, "stake_in": 269499.69, "stake_out": 59495.47, "net_stake": 210004.22}, {"date": "2026-06-16", "bonus_balance": 8130507.96, "bonus_withdraw": 203174.47, "dynamic": 201623.87, "static": 111473.25, "dynamic_turbo": 90150.62, "stake_balance": 24800722.94, "stake_in": 120111.17, "stake_out": 39460.74, "net_stake": 80650.43}, {"date": "2026-06-17", "bonus_balance": 7927333.49, "bonus_withdraw": 170247.19, "dynamic": 198855.91, "static": 104411.18, "dynamic_turbo": 94444.73, "stake_balance": 24881373.37, "stake_in": 122071.61, "stake_out": 48520.73, "net_stake": 73550.88}, {"date": "2026-06-18", "bonus_balance": 7757086.3, "bonus_withdraw": 207327.02, "dynamic": 253214.88, "static": 143578.57, "dynamic_turbo": 109636.31, "stake_balance": 24954924.25, "stake_in": 145524.85, "stake_out": 73887.9, "net_stake": 71636.95}, {"date": "2026-06-19", "bonus_balance": 7549759.28, "bonus_withdraw": 210320.42, "dynamic": 195421.34, "static": 99397.44, "dynamic_turbo": 96023.9, "stake_balance": 25026561.2, "stake_in": 111871.0, "stake_out": 54180.14, "net_stake": 57690.86}];
  render();
}

function render() {
  const data = chartData;
  if (!data || data.length === 0) return;
  const latest = data[data.length - 1];

  // Summary Cards
  const cards = [
    { label: '💰 奖金池余额', value: latest.bonus_balance, sub: latest.date },
    { label: '🏛️ 质押池余额', value: latest.stake_balance, sub: latest.date },
    { label: '📤 奖金池提取', value: latest.bonus_withdraw, sub: latest.date },
    { label: '⚡ 动静态涡轮', value: latest.dynamic, sub: latest.date },
    { label: '🔥 静态涡轮(gARK)', value: latest.static, sub: latest.date },
    { label: '🌀 动态涡轮', value: latest.dynamic_turbo, sub: latest.date },
    { label: '📥 新增质押', value: latest.stake_in, sub: latest.date },
    { label: '📤 赎回', value: latest.stake_out, sub: latest.date },
    { label: '⚖️ 净质押', value: latest.net_stake, cls: latest.net_stake >= 0 ? 'positive' : 'negative', fmt: v => (v >= 0 ? '+' : '') + v.toLocaleString(), sub: latest.date },
  ];
  document.getElementById('summaryCards').innerHTML = cards.map(c =>
    '<div class="card"><div class="label">' + c.label + '</div><div class="value ' + (c.cls || '') + '">' + (c.fmt ? c.fmt(c.value) : fmtNum(c.value)) + '</div><div class="sub">' + c.sub + '</div></div>'
  ).join('');

  const dates = data.map(d => d.date);
  const tableRows = data.slice().reverse().map(d =>
    '<tr><td>' + d.date + '</td><td>' + d.bonus_balance.toLocaleString() + '</td><td>' + d.bonus_withdraw + '</td><td>' + d.dynamic + '</td><td>' + d.static + '</td><td>' + d.dynamic_turbo + '</td><td>' + d.stake_balance.toLocaleString() + '</td><td>' + d.stake_in + '</td><td>' + d.stake_out + '</td><td style="color:' + (d.net_stake >= 0 ? '#22c55e' : '#ef4444') + '">' + d.net_stake + '</td></tr>'
  ).join('');
  document.querySelector('#dataTable tbody').innerHTML = tableRows;

  renderSVGChart(data, dates);
  if (!document.getElementById('updateTime').textContent.includes('飞书')) {
    document.getElementById('updateTime').textContent = 'BSC 链 · 数据更新至 ' + data[data.length-1].date;
  }
}

function renderSVGChart(data, dates) {
  const W = 600, H = 280, PAD = { top: 20, right: 20, bottom: 40, left: 70 };
  const CW = W - PAD.left - PAD.right;
  const CH = H - PAD.top - PAD.bottom;

  // Chart 1: 柱状图
  function makeChart(series, colors) {
    const allVals = series.flat();
    const maxVal = Math.max(...allVals, 1);
    const minVal = Math.min(...allVals, 0);
    const range = maxVal - minVal || 1;
    const step = Math.pow(10, Math.floor(Math.log10(range))) / 2 || 1;
    const yMax = Math.ceil(maxVal / step) * step;
    const yMin = Math.floor(minVal / step) * step;
    const yRange = yMax - yMin || 1;

    let svg = '<svg width="100%" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="display:block;margin:0 auto">';
    for (let y = yMax; y >= yMin; y -= step) {
      const yy = PAD.top + (yMax - y) / yRange * CH;
      svg += '<text x="' + (PAD.left - 8) + '" y="' + (yy + 4) + '" text-anchor="end" font-size="11" fill="#888">' + (y >= 1000 ? Math.round(y/1000) + 'k' : Math.round(y)) + '</text>';
      svg += '<line x1="' + PAD.left + '" y1="' + yy + '" x2="' + (W - PAD.right) + '" y2="' + yy + '" stroke="#eee" stroke-width="1"/>';
    }
    const bw = CW / dates.length * 0.7;
    const gap = CW / dates.length * 0.15;
    const colorsList = ['#3b82f6', '#8b5cf6', '#22c55e', '#ef4444'];
    series.forEach((s, si) => {
      s.forEach((v, i) => {
        const x = PAD.left + i * CW / dates.length + gap + si * (bw / series.length);
        const h = (v - yMin) / yRange * CH;
        const y = PAD.top + CH - h;
        svg += '<rect x="' + x + '" y="' + y + '" width="' + (bw / series.length - 2) + '" height="' + h + '" fill="' + (colors ? colors[si] : colorsList[si]) + '" rx="2"/>';
      });
    });
    dates.forEach((d, i) => {
      const x = PAD.left + i * CW / dates.length + CW / dates.length / 2;
      svg += '<text x="' + x + '" y="' + (H - PAD.bottom + 18) + '" text-anchor="middle" font-size="11" fill="#888">' + d.slice(5) + '</text>';
    });
    svg += '</svg>';
    return svg;
  }

  document.getElementById('mainChart').outerHTML =
    '<div class="chart-box"><h3>📈 奖金池 · 涡轮 · 质押趋势</h3>' +
    makeChart(
      [data.map(d => d.bonus_withdraw), data.map(d => d.dynamic), data.map(d => d.stake_in), data.map(d => d.stake_out)],
      ['#3b82f6', '#8b5cf6', '#22c55e', '#ef4444']
    ) +
    '<div style="display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:12px;color:#555;flex-wrap:wrap">' +
    '<span><span style="display:inline-block;width:12px;height:12px;background:#3b82f6;border-radius:2px;vertical-align:middle;margin-right:4px"></span>奖金池提取</span>' +
    '<span><span style="display:inline-block;width:12px;height:12px;background:#8b5cf6;border-radius:2px;vertical-align:middle;margin-right:4px"></span>动静态涡轮</span>' +
    '<span><span style="display:inline-block;width:12px;height:12px;background:#22c55e;border-radius:2px;vertical-align:middle;margin-right:4px"></span>新增质押</span>' +
    '<span><span style="display:inline-block;width:12px;height:12px;background:#ef4444;border-radius:2px;vertical-align:middle;margin-right:4px"></span>赎回</span>' +
    '</div></div>';

  // Chart 2: 折线图
  const netData = data.map(d => d.net_stake);
  const staticData = data.map(d => d.static);
  const allVals2 = [...netData, ...staticData];
  const maxVal2 = Math.max(...allVals2, 1);
  const minVal2 = Math.min(...allVals2, 0);
  const range2 = maxVal2 - minVal2 || 1;
  const step2 = Math.pow(10, Math.floor(Math.log10(range2))) / 2 || 1;
  const yMax2 = Math.ceil(maxVal2 / step2) * step2;
  const yMin2 = Math.floor(minVal2 / step2) * step2;
  const yRange2 = yMax2 - yMin2 || 1;

  let svg2 = '<svg width="100%" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="display:block;margin:0 auto">';
  for (let y = yMax2; y >= yMin2; y -= step2) {
    const yy = PAD.top + (yMax2 - y) / yRange2 * CH;
    svg2 += '<text x="' + (PAD.left - 8) + '" y="' + (yy + 4) + '" text-anchor="end" font-size="11" fill="#888">' + (y >= 1000 ? Math.round(y/1000) + 'k' : Math.round(y)) + '</text>';
    svg2 += '<line x1="' + PAD.left + '" y1="' + yy + '" x2="' + (W - PAD.right) + '" y2="' + yy + '" stroke="#eee" stroke-width="1"/>';
  }
  let netPath = '', staticPath = '';
  netData.forEach((v, i) => {
    const x = PAD.left + i * CW / (netData.length - 1 || 1);
    const y = PAD.top + CH - (v - yMin2) / yRange2 * CH;
    netPath += (i === 0 ? 'M' : 'L') + x + ',' + y;
  });
  staticData.forEach((v, i) => {
    const x = PAD.left + i * CW / (staticData.length - 1 || 1);
    const y = PAD.top + CH - (v - yMin2) / yRange2 * CH;
    staticPath += (i === 0 ? 'M' : 'L') + x + ',' + y;
  });
  svg2 += '<path d="' + netPath + '" stroke="#f59e0b" stroke-width="2.5" fill="none"/>';
  svg2 += '<path d="' + staticPath + '" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" fill="none"/>';
  netData.forEach((v, i) => {
    const x = PAD.left + i * CW / (netData.length - 1 || 1);
    const y = PAD.top + CH - (v - yMin2) / yRange2 * CH;
    svg2 += '<circle cx="' + x + '" cy="' + y + '" r="4.5" fill="#f59e0b" stroke="#fff" stroke-width="1.5"/>';
  });
  dates.forEach((d, i) => {
    const x = PAD.left + i * CW / (dates.length - 1 || 1);
    svg2 += '<text x="' + x + '" y="' + (H - PAD.bottom + 18) + '" text-anchor="middle" font-size="11" fill="#888">' + d.slice(5) + '</text>';
  });
  svg2 += '</svg>';

  document.getElementById('netChart').outerHTML =
    '<div class="chart-box"><h3>🥧 净质押 & gARK销毁</h3>' +
    svg2 +
    '<div style="display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:12px;color:#555">' +
    '<span><span style="display:inline-block;width:16px;height:3px;background:#f59e0b;vertical-align:middle;margin-right:4px;border-radius:2px"></span>净质押</span>' +
    '<span><span style="display:inline-block;width:16px;height:3px;background:#ef4444;vertical-align:middle;margin-right:4px;border-radius:2px"></span>静态涡轮(gARK)</span>' +
    '</div></div>';
}

loadData();

// 每 60 秒自动刷新
setInterval(loadData, 60000);
</script>
</body>
</html>
